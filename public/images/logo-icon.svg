<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="hexGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#047857"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="threadGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="256" fill="url(#hexGradient)"/>
  
  <!-- Hexagon Shape -->
  <polygon 
    points="256,80 400,150 400,330 256,400 112,330 112,150" 
    fill="rgba(255,255,255,0.15)"
  />
  
  <!-- Inner Hexagon -->
  <polygon 
    points="256,110 370,165 370,315 256,370 142,315 142,165" 
    fill="none"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="3"
  />
  
  <!-- Thread/Fabric Wave -->
  <path 
    d="M130,256 Q190,180 256,256 T382,256" 
    stroke="url(#threadGradient)"
    stroke-width="28" 
    fill="none" 
    stroke-linecap="round"
  />
  
  <!-- Second thread layer -->
  <path 
    d="M160,256 Q205,200 256,256 T352,256" 
    stroke="rgba(255,255,255,0.3)"
    stroke-width="12" 
    fill="none" 
    stroke-linecap="round"
  />
  
  <!-- Core Circle -->
  <circle cx="256" cy="256" r="45" fill="white" opacity="0.95"/>
  
  <!-- Inner core detail -->
  <circle cx="256" cy="256" r="22" fill="#047857" opacity="0.6"/>
</svg>
